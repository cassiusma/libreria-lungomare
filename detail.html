<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Libre · Viareggio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; object-fit: cover; }
    :root {
      --cream: #f8f2e2; --linen: #efe6cc; --sand: #d9c99a;
      --wood-light: #c4aa7a; --wood-mid: #8a6e4e;
      --walnut: #4a3728; --walnut-deep: #2e2118;
      --text-main: #2e2118; --text-mid: #6b5040; --text-muted: #9a8070;
    }
    body { font-family: 'Inter', sans-serif; font-weight: 300; background: var(--cream); color: var(--text-main); line-height: 1.7; }

    nav { position: sticky; top: 0; z-index: 100; background: var(--cream); border-bottom: 0.5px solid var(--sand); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .nav-logo { text-decoration: none; white-space: nowrap; line-height: 1.2; }
    .nav-logo-main { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; color: var(--walnut-deep); letter-spacing: 0.02em; display: block; }
    .nav-logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; font-weight: 300; display: block; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 12px; color: var(--text-mid); text-decoration: none; letter-spacing: 0.07em; text-transform: uppercase; font-weight: 400; transition: color 0.2s; }
    .nav-links a:hover { color: var(--walnut-deep); }
    .nav-lang { font-size: 18px; border: 0.5px solid var(--sand); padding: 4px 10px; border-radius: 5px; cursor: pointer; background: transparent; font-family: 'Inter', sans-serif; white-space: nowrap; letter-spacing: 0.1em; }

    /* Breadcrumb */
    .breadcrumb { padding: 1rem 2rem; max-width: 860px; margin: 0 auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--walnut); }
    .breadcrumb span { margin: 0 0.4rem; }

    /* Detail layout */
    .detail-wrap { max-width: 860px; margin: 0 auto; padding: 1.5rem 2rem 4rem; display: grid; grid-template-columns: 320px 1fr; gap: 3rem; align-items: start; }
    .detail-img-wrap { background: var(--sand); border-radius: 12px; overflow: hidden; aspect-ratio: 3/4; }
    .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-info { padding-top: 0.5rem; }
    .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--wood-mid); margin-bottom: 0.5rem; }
    .detail-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--walnut-deep); line-height: 1.2; margin-bottom: 0.5rem; }
    .detail-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 0.3rem; }
    .detail-price { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--walnut); margin: 1rem 0 0.25rem; }
    .divider { width: 40px; height: 1px; background: var(--wood-light); margin: 1.2rem 0; }
    .detail-desc { font-size: 14px; color: var(--text-mid); line-height: 1.95; max-width: 480px; margin-bottom: 2rem; }

    /* WhatsApp CTA */
    .wa-cta { display: inline-flex; align-items: center; gap: 0.6rem; background: #25d366; color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; padding: 0.75rem 1.6rem; border-radius: 8px; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .wa-cta:hover { background: #1ebe5a; transform: translateY(-1px); }
    .wa-cta svg { flex-shrink: 0; }
    .wa-note { font-size: 11px; color: var(--text-muted); margin-top: 0.6rem; letter-spacing: 0.03em; }

    /* Back link */
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 12px; color: var(--text-muted); text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2.5rem; transition: color 0.2s; }
    .back-link:hover { color: var(--walnut); }

    /* Not found */
    .not-found { text-align: center; padding: 6rem 2rem; }
    .not-found h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--walnut-deep); margin-bottom: 1rem; }
    .not-found p { font-size: 14px; color: var(--text-mid); }

    footer { background: var(--walnut-deep); padding: 2.5rem 2rem; text-align: center; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--linen); margin-bottom: 0.25rem; }
    .footer-sub { font-size: 11px; color: var(--wood-mid); letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    footer p { font-size: 11px; color: var(--wood-light); letter-spacing: 0.05em; font-weight: 300; }

    @media (max-width: 640px) {
      nav { padding: 0.75rem 1.2rem; }
      .nav-links { display: none; }
      .breadcrumb { padding: 1rem 1.2rem; }
      .detail-wrap { grid-template-columns: 1fr; gap: 1.5rem; padding: 1rem 1.2rem 3rem; }
      .detail-img-wrap { max-width: 280px; }
      .detail-title { font-size: 22px; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-main">La Libre</span>
      <span class="nav-logo-sub">Libreria Lungomare</span>
    </a>
    <ul class="nav-links">
      <li><a href="books.html" data-it="Libri" data-en="Books">Libri</a></li>
      <li><a href="wine.html" data-it="Vino" data-en="Wine">Vino</a></li>
      <li><a href="coffee.html" data-it="Caffè" data-en="Coffee">Caffè</a></li>
      <li><a href="index.html#visit" data-it="Vieni" data-en="Visit">Vieni</a></li>
    </ul>
    <button class="nav-lang" id="lang-toggle" title="Switch language">🇬🇧</button>
  </nav>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="detail-root"></div>

  <footer>
    <div class="footer-logo">La Libre</div>
    <div class="footer-sub">Libreria Lungomare · Viareggio</div>
    <p>© 2026 · Libri · Vino · Caffè</p>
  </footer>

  <script src="products.js"></script>
  <script>
    const WA_ICON_LG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.553 4.122 1.523 5.855L.057 23.215a.75.75 0 0 0 .923.923l5.36-1.466A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.694 9.694 0 0 1-4.98-1.371l-.356-.212-3.705 1.013 1.013-3.705-.212-.356A9.694 9.694 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>`;

    const lang_state = { lang: 'it' };

    const CAT_LABELS = {
      wine:   { it: 'Vino',   en: 'Wine',   page: 'wine.html' },
      books:  { it: 'Libri',  en: 'Books',  page: 'books.html' },
      coffee: { it: 'Caffè',  en: 'Coffee', page: 'coffee.html' },
    };

    const CAT_EYEBROW = {
      wine:   { it: 'Vino naturale', en: 'Natural wine' },
      books:  { it: 'Libro',         en: 'Book' },
      coffee: { it: 'Specialty coffee', en: 'Specialty coffee' },
    };

    const META_LINES = {
      wine:   p => [p.producer, p.type].filter(Boolean),
      books:  p => [p.author, p.publisher].filter(Boolean),
      coffee: p => [p.roaster, p.brewMethod].filter(Boolean),
    };

    function getParams() {
      const sp = new URLSearchParams(window.location.search);
      return { id: sp.get('id'), cat: sp.get('cat') };
    }

    function render() {
      const { id, cat } = getParams();
      const root = document.getElementById('detail-root');
      const bc = document.getElementById('breadcrumb');

      const catData = CAT_LABELS[cat];
      const products = PRODUCTS[cat];
      const product = products && products.find(p => p.id === id);

      if (!product || !catData) {
        root.innerHTML = `<div class="not-found"><h2>Prodotto non trovato</h2><p><a href="index.html">← Torna alla home</a></p></div>`;
        return;
      }

      // Update page title
      document.title = `${product.title} — La Libre · Viareggio`;

      // Breadcrumb
      bc.innerHTML = `<a href="index.html">La Libre</a><span>·</span><a href="${catData.page}">${catData.it}</a><span>·</span>${product.title}`;

      // Meta lines
      const metaLines = META_LINES[cat](product);
      const metaHtml = metaLines.map(l => `<div class="detail-meta">${l}</div>`).join('');
      const priceHtml = product.price ? `<div class="detail-price">${product.price}</div>` : '';

      const wa = waLink(product.title, cat);

      root.innerHTML = `
        <div class="detail-wrap">
          <div class="detail-img-wrap">
            <img src="${product.foto}" alt="${product.title}" />
          </div>
          <div class="detail-info">
            <div class="eyebrow" data-it="${CAT_EYEBROW[cat].it}" data-en="${CAT_EYEBROW[cat].en}">${CAT_EYEBROW[cat].it}</div>
            <h1 class="detail-title">${product.title}</h1>
            ${metaHtml}
            ${priceHtml}
            <div class="divider"></div>
            <p class="detail-desc" data-it="${product.description_it}" data-en="${product.description_en}">${product.description_it}</p>
            <a class="wa-cta" href="${wa}" target="_blank" rel="noopener">
              ${WA_ICON_LG}
              <span data-it="Chiedi info o ordina su WhatsApp" data-en="Ask or order on WhatsApp">Chiedi info o ordina su WhatsApp</span>
            </a>
            <p class="wa-note" data-it="Ti risponderemo il prima possibile." data-en="We'll get back to you as soon as possible.">Ti risponderemo il prima possibile.</p>
            <a class="back-link" href="${catData.page}">← <span data-it="Torna a ${catData.it}" data-en="Back to ${catData.en}">Torna a ${catData.it}</span></a>
          </div>
        </div>`;
    }

    render();

    // Language toggle
    const toggle = document.getElementById('lang-toggle');
    toggle.addEventListener('click', () => {
      lang_state.lang = lang_state.lang === 'it' ? 'en' : 'it';
      toggle.textContent = lang_state.lang === 'it' ? '🇬🇧' : '🇮🇹';
      document.querySelectorAll('[data-it]').forEach(el => {
        const text = el.getAttribute('data-' + lang_state.lang);
        if (text) el.innerHTML = text;
      });
    });
  </script>
</body>
</html>
